version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - db_data:/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////data/yt_metadata.db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://frontend
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
